<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="1st"/>
<meta name="theme-color" content="#2563eb"/>
<title>First of the Month</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #f8fafd; --surface: #ffffff; --surface-hover: #f0f5fb;
    --border: #dce6f0; --border-light: #eaf1f8;
    --text: #1a2332; --text-sub: #5a7290; --text-muted: #93aec6;
    --accent: #2563eb; --accent-hover: #1d4ed8;
    --accent-light: #eff6ff; --accent-border: #bfdbfe;
    --pill-bg: #eff6ff;
    --warn-bg: #fffbeb; --warn-border: #fde68a; --warn-text: #92400e; --warn-pill: #fef3c7;
    --done-text: #a0b8cf; --red: #ef4444; --green: #16a34a;
    --radius: 12px; --radius-sm: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Geist', -apple-system, sans-serif; font-weight: 400; min-height: 100vh; -webkit-font-smoothing: antialiased; padding-bottom: 80px; }
  .page { max-width: 600px; margin: 0 auto; padding: 0 20px; }

  /* ── Loading ── */
  #loading { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 200; flex-direction: column; gap: 12px; }
  #loading.hidden { display: none; }
  .spinner { width: 24px; height: 24px; border: 2.5px solid var(--accent-border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text-muted); }

  /* ── Sync indicator ── */
  #sync-status { position: fixed; bottom: 52px; right: 16px; font-size: 11px; font-weight: 500; padding: 5px 10px; border-radius: 99px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 50; }
  #sync-status.saving { background: var(--accent-light); color: var(--accent); opacity: 1; }
  #sync-status.saved  { background: #f0fdf4; color: var(--green); opacity: 1; }
  #sync-status.error  { background: #fef2f2; color: var(--red); opacity: 1; }

  /* ── Header ── */
  .header { padding: 40px 0 20px; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .wordmark { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 6px; }

  /* nav + refresh buttons share same style */
  .icon-btn {
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
    cursor: pointer; color: var(--text-sub);
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .icon-btn:hover:not(:disabled) { background: var(--accent-light); color: var(--accent); border-color: var(--accent-border); }
  .icon-btn:disabled { opacity: 0.2; cursor: not-allowed; }
  .icon-btn.spinning svg { animation: spin 0.7s linear infinite; }

  .month-nav { display: flex; align-items: center; gap: 4px; }

  .month-heading { font-size: clamp(32px, 8vw, 44px); font-weight: 600; letter-spacing: -0.03em; color: var(--text); line-height: 1.05; }
  .month-heading .year { font-weight: 300; color: var(--text-muted); margin-left: 6px; font-size: 0.72em; }

  /* ── Today button ── */
  #today-btn {
    display: none;
    font-family: inherit; font-size: 11px; font-weight: 500;
    color: var(--accent); background: var(--accent-light);
    border: 1px solid var(--accent-border); border-radius: 99px;
    padding: 4px 12px; cursor: pointer; margin-top: 8px;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s;
  }
  #today-btn:hover { background: var(--accent-border); }
  #today-btn.visible { display: inline-flex; align-items: center; gap: 5px; }

  /* ── Progress ── */
  .progress-wrap { display: flex; align-items: center; gap: 10px; margin: 20px 0 28px; }
  .progress-track { flex: 1; height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.45s cubic-bezier(.4,0,.2,1); }
  .progress-pill { font-size: 11px; font-weight: 500; color: var(--accent); background: var(--pill-bg); border-radius: 99px; padding: 3px 9px; white-space: nowrap; min-width: 48px; text-align: center; }

  /* ── Outstanding banner ── */
  #outstanding-banner { background: var(--warn-bg); border: 1px solid var(--warn-border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 24px; display: none; }
  .banner-label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--warn-text); margin-bottom: 10px; }
  .banner-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .banner-chip { font-family: inherit; font-size: 12px; font-weight: 500; background: var(--warn-pill); border: 1px solid var(--warn-border); border-radius: 99px; padding: 4px 11px; cursor: pointer; color: var(--warn-text); transition: background 0.12s; -webkit-tap-highlight-color: transparent; }
  .banner-chip:hover { background: var(--warn-border); }
  .banner-chip.cleared { opacity: 0.4; text-decoration: line-through; cursor: default; }

  /* ── Card ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; }
  .section-header { display: flex; align-items: center; padding: 14px 16px 10px; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }

  /* ── Items ── */
  .checklist { list-style: none; }
  .c-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-top: 1px solid var(--border-light); transition: background 0.1s; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; touch-action: pan-y; position: relative; }
  .c-item:first-child { border-top: none; }
  .c-item:hover { background: var(--surface-hover); }
  .c-item.is-done { background: transparent; }
  .c-item.dragging { opacity: 0.4; background: var(--surface-hover); }
  .c-item.drag-over { border-top: 2px solid var(--accent); }

  .cb { position: relative; width: 20px; height: 20px; flex-shrink: 0; }
  .cb input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; margin: 0; z-index: 1; }
  .cb-visual { width: 20px; height: 20px; border: 1.5px solid var(--border); border-radius: 6px; background: var(--surface); display: flex; align-items: center; justify-content: center; transition: all 0.15s; pointer-events: none; }
  .cb input:checked ~ .cb-visual { background: var(--accent); border-color: var(--accent); }
  .cb-tick { display: none; }
  .cb-tick path { stroke: #fff; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .cb input:checked ~ .cb-visual .cb-tick { display: block; }

  .c-label { flex: 1; font-size: 16px; font-weight: 400; color: var(--text); line-height: 1.4; transition: color 0.15s; min-width: 0; }
  .c-item.is-done .c-label { color: var(--done-text); text-decoration: line-through; text-decoration-color: var(--border); }

  .c-edit-input { flex: 1; font-family: inherit; font-size: 16px; font-weight: 400; background: transparent; border: none; border-bottom: 1.5px solid var(--accent); color: var(--text); outline: none; padding: 1px 0; min-width: 0; caret-color: var(--accent); }
  .add-field { flex: 1; font-family: inherit; font-size: 16px; font-weight: 400; background: var(--surface-hover); border: 1px solid transparent; border-radius: var(--radius-sm); padding: 8px 12px; color: var(--text); outline: none; transition: border-color 0.15s, background 0.15s; min-width: 0; }
  .add-field:focus { background: var(--surface); border-color: var(--accent-border); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
  .add-field::placeholder { color: var(--text-muted); }

  .c-actions { display: flex; gap: 2px; flex-shrink: 0; opacity: 0; transition: opacity 0.12s; pointer-events: none; }
  @media (hover: hover) { .c-item:hover .c-actions { opacity: 1; pointer-events: all; } }
  .c-actions.active { opacity: 1; pointer-events: all; }

  .row-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: none; border: none; border-radius: 6px; cursor: pointer; color: var(--text-muted); transition: background 0.1s, color 0.1s; -webkit-tap-highlight-color: transparent; }
  .row-btn:hover { background: var(--surface-hover); color: var(--text); }
  .row-btn.del:hover { color: var(--red); }
  .row-btn.confirm { color: var(--green); }
  .row-btn.confirm:hover { color: var(--green); background: #f0fdf4; }

  /* ── Add row ── */
  .add-row { display: flex; gap: 8px; padding: 10px 16px 14px; border-top: 1px solid var(--border-light); }
  .add-btn { font-family: inherit; font-size: 14px; font-weight: 500; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 8px 14px; cursor: pointer; transition: background 0.12s; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
  .add-btn:hover { background: var(--accent-hover); }
  .add-btn:active { transform: scale(0.97); }

  .empty-row { padding: 14px 16px; font-size: 14px; color: var(--text-muted); border-top: 1px solid var(--border-light); }
  .empty-row:first-child { border-top: none; }

  /* ── Footer ── */
  .footer { text-align: center; padding: 28px 0 8px; }
  .footer-text { font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em; }

  /* ── Modal ── */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); width: 100%; max-width: 380px; padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); transform: translateY(10px); transition: transform 0.2s; }
  .modal-backdrop.open .modal { transform: translateY(0); }
  .modal-icon { width: 40px; height: 40px; border-radius: 10px; background: #eff6ff; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
  .modal-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 8px; letter-spacing: -0.01em; }
  .modal-body { font-size: 13.5px; color: var(--text-sub); line-height: 1.6; margin-bottom: 22px; }
  .modal-body strong { color: var(--text); font-weight: 500; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btn { font-family: inherit; font-size: 13px; font-weight: 500; border-radius: var(--radius-sm); padding: 8px 16px; cursor: pointer; border: 1px solid var(--border); transition: background 0.12s; -webkit-tap-highlight-color: transparent; }
  .modal-btn.secondary { background: var(--surface); color: var(--text-sub); }
  .modal-btn.secondary:hover { background: var(--surface-hover); }
  .modal-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .modal-btn.primary:hover { background: var(--accent-hover); }

  @keyframes fadeSlide { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .c-item { animation: fadeSlide 0.18s ease; }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><div class="loading-text">Loading…</div></div>
<div id="sync-status">Saving…</div>

<div class="page">
  <header class="header">
    <div class="header-top">
      <span class="wordmark">First of the Month</span>
      <div class="header-right">
        <!-- Refresh button -->
        <button class="icon-btn" id="refresh-btn" title="Refresh">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1.5 7A5.5 5.5 0 0 1 12 4.5M12.5 2v3h-3"/>
            <path d="M12.5 7A5.5 5.5 0 0 1 2 9.5M1.5 12V9h3"/>
          </svg>
        </button>
        <!-- Month navigation -->
        <div class="month-nav">
          <button class="icon-btn" id="prev-btn">&#8592;</button>
          <button class="icon-btn" id="next-btn">&#8594;</button>
        </div>
      </div>
    </div>
    <h1 class="month-heading" id="month-display"></h1>
    <!-- Back to today button — only shows when viewing a past month -->
    <button id="today-btn">
      <svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="5.5"/><path d="M7 4v3.5l2 1.5"/></svg>
      Back to today
    </button>
  </header>

  <div id="outstanding-banner">
    <div class="banner-label">Outstanding</div>
    <div class="banner-chips" id="banner-chips"></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-pill" id="progress-pill">0 / 0</div>
  </div>

  <div class="card" style="margin-bottom:12px">
    <div class="section-header"><span class="section-label">Monthly</span></div>
    <ul class="checklist" id="checklist"></ul>
    <div class="add-row"><input class="add-field" id="new-task-input" type="text" placeholder="Add recurring task…"/><button class="add-btn" id="add-task-btn">Add</button></div>
  </div>

  <div class="card">
    <div class="section-header"><span class="section-label">Ongoing Projects</span></div>
    <ul class="checklist" id="ongoing-list"></ul>
    <div class="add-row"><input class="add-field" id="new-project-input" type="text" placeholder="Add project…"/><button class="add-btn" id="add-project-btn">Add</button></div>
  </div>

  <footer class="footer">
    <p class="footer-text">Created Mar 29, 2026</p>
  </footer>
</div>

<!-- Archive modal -->
<div class="modal-backdrop" id="archive-modal">
  <div class="modal">
    <div class="modal-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="8"/><path d="M6.5 10l2.5 2.5 4.5-4.5"/></svg></div>
    <div class="modal-title" id="modal-title">Archive this month?</div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" id="modal-cancel">Keep it</button>
      <button class="modal-btn primary" id="modal-confirm">Archive</button>
    </div>
  </div>
</div>

<script>
// ── Supabase ──────────────────────────────────────────────
const SB_URL = 'https://lcdpkuysstfvgqzbqhcv.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxjZHBrdXlzc3RmdmdxemJxaGN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MzIyMDIsImV4cCI6MjA5MDQwODIwMn0.oegA_G0XcVZM1kboo0m-TEr37PjTU7sk7nP2wV2N6HU';
const SB_H = { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };

async function sbGet(key) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/fotm?key=eq.${encodeURIComponent(key)}&select=value`, { headers: SB_H });
    const d = await r.json(); return d && d.length ? d[0].value : null;
  } catch { return null; }
}
async function sbSet(key, value) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/fotm`, {
      method: 'POST', headers: { ...SB_H, Prefer: 'resolution=merge-duplicates' },
      body: JSON.stringify({ key, value, updated_at: new Date().toISOString() })
    }); return r.ok;
  } catch { return false; }
}

// ── Config ────────────────────────────────────────────────
// App starts from Aug 2025 — no hardcoded outstanding list anymore.
// Any past month (from FIRST_MONTH onwards) that isn't complete is automatically outstanding.
const FIRST_MONTH = { year: 2025, month: 7 }; // Aug 2025

const DEFAULT_TASKS = ["2025 Expenses","Charlie Finances","Charlie Pictures","Z&C Log","Change Wallet","Amex $10 Uber Cash","Amex $10 Grubhub","United $5 Rideshare","Chase $10 Lyft","Update Letterboxd"];
const DEFAULT_PROJECTS = [{id:"p1",name:"Post Portugal pics",completed:false},{id:"p2",name:"Post Chicago pics",completed:false},{id:"p3",name:"Post pics from Canada with Mom",completed:false},{id:"p4",name:"Post Korea/Japan pics",completed:false}];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

// ── Cache + sync ──────────────────────────────────────────
const mem = {};
let syncTimer;

function showSync(state) {
  const el = document.getElementById('sync-status');
  el.className = '';
  el.textContent = state==='saving'?'Saving…':state==='saved'?'Saved ✓':'Error saving';
  el.classList.add(state);
  clearTimeout(syncTimer);
  if (state !== 'saving') syncTimer = setTimeout(()=>{ el.className=''; }, 2000);
}

async function getKey(key, fallback) {
  if (mem[key] !== undefined) return mem[key];
  const raw = await sbGet(key);
  const val = raw ? JSON.parse(raw) : (typeof fallback === 'function' ? fallback() : fallback);
  mem[key] = val; return val;
}
async function setKey(key, value) {
  mem[key] = value; showSync('saving');
  const ok = await sbSet(key, JSON.stringify(value));
  showSync(ok ? 'saved' : 'error');
}

// ── Storage ───────────────────────────────────────────────
const K = {
  tasks: 'fotm_tasks', projects: 'fotm_projects', archived: 'fotm_archived',
  checks: (y,m) => `fotm_checks_${y}_${String(m).padStart(2,'0')}`
};
const loadTasks     = ()     => getKey(K.tasks,    ()=>[...DEFAULT_TASKS]);
const saveTasks     = v      => setKey(K.tasks, v);
const loadChecks    = (y,m)  => getKey(K.checks(y,m), {});
const saveChecks    = (y,m,v)=> setKey(K.checks(y,m), v);
const loadProjects  = ()     => getKey(K.projects, ()=>DEFAULT_PROJECTS.map(p=>({...p})));
const saveProjects  = v      => setKey(K.projects, v);
const loadArchived  = ()     => getKey(K.archived, []);
const archiveMonth  = async(y,m) => { const a=await loadArchived(); a.push([y,m]); await setKey(K.archived,a); };

// ── State ─────────────────────────────────────────────────
let curY, curM, pendingArchive=null, activeActionRow=null;

// ── Init ──────────────────────────────────────────────────
async function init() {
  const n = getNow(); curY=n.y; curM=n.m;
  await Promise.all([loadTasks(), loadProjects(), loadArchived(), loadChecks(curY,curM)]);
  // If current month is archived, go to last valid
  const arch = await loadArchived();
  if (arch.some(([ay,am])=>ay===curY&&am===curM)) {
    const v = await getValidMonths(); if(v.length){curY=v[v.length-1][0];curM=v[v.length-1][1];}
  }
  document.getElementById('loading').classList.add('hidden');
  document.addEventListener('click', handleOutsideClick, true);
  registerSW();
  await render();
}

// ── Refresh ───────────────────────────────────────────────
document.getElementById('refresh-btn').addEventListener('click', async () => {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning'); btn.disabled = true;
  // Clear cache and reload from Supabase
  Object.keys(mem).forEach(k => delete mem[k]);
  await Promise.all([loadTasks(), loadProjects(), loadArchived(), loadChecks(curY,curM)]);
  await render();
  btn.classList.remove('spinning'); btn.disabled = false;
});

// ── Today button ──────────────────────────────────────────
function updateTodayBtn() {
  const n = getNow();
  const isToday = curY===n.y && curM===n.m;
  const btn = document.getElementById('today-btn');
  btn.classList.toggle('visible', !isToday);
}
document.getElementById('today-btn').addEventListener('click', async () => {
  const n = getNow(); curY=n.y; curM=n.m;
  await render(); scrollTo({top:0,behavior:'smooth'});
});

// ── Outside click ─────────────────────────────────────────
function handleOutsideClick(e) {
  if (!activeActionRow) return;
  if (!activeActionRow.contains(e.target)) {
    const a = activeActionRow.querySelector('.c-actions');
    if (a && !a.classList.contains('editing')) a.classList.remove('active');
    activeActionRow = null;
  }
}
function toggleActions(li) {
  const a = li.querySelector('.c-actions'); if(!a)return;
  const open = a.classList.contains('active');
  if (activeActionRow && activeActionRow!==li) {
    const p=activeActionRow.querySelector('.c-actions');
    if(p&&!p.classList.contains('editing'))p.classList.remove('active');
  }
  if(open){a.classList.remove('active');activeActionRow=null;}
  else{a.classList.add('active');activeActionRow=li;}
}

// ── Helpers ───────────────────────────────────────────────
function getNow(){const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};}
function monthIdx(y,m){return y*12+m;}
async function isArchived(y,m){const a=await loadArchived();return a.some(([ay,am])=>ay===y&&am===m);}

async function getValidMonths(){
  const n=getNow(),result=[];
  let y=FIRST_MONTH.year,m=FIRST_MONTH.month;
  while(monthIdx(y,m)<=monthIdx(n.y,n.m)){
    if(!(await isArchived(y,m)))result.push([y,m]);
    m++;if(m>11){m=0;y++;}
  }
  return result;
}
async function prevValid(y,m){const v=await getValidMonths();const i=v.findIndex(([vy,vm])=>vy===y&&vm===m);return i>0?v[i-1]:null;}
async function nextValid(y,m){const v=await getValidMonths();const i=v.findIndex(([vy,vm])=>vy===y&&vm===m);return(i!==-1&&i<v.length-1)?v[i+1]:null;}
async function isMonthComplete(y,m){const t=await loadTasks(),c=await loadChecks(y,m);return t.length>0&&t.every(x=>c[x]);}

// ── Outstanding: ALL past months from FIRST_MONTH that aren't archived ──
async function getOutstandingMonths(){
  const n=getNow(), arch=await loadArchived(), result=[];
  let y=FIRST_MONTH.year, m=FIRST_MONTH.month;
  // Include all months up to and including current
  while(monthIdx(y,m)<=monthIdx(n.y,n.m)){
    if(!arch.some(([ay,am])=>ay===y&&am===m)){
      result.push([y,m]);
    }
    m++;if(m>11){m=0;y++;}
  }
  return result;
}

// ── Render ────────────────────────────────────────────────
async function render(){await Promise.all([renderHeader(),renderBanner(),renderChecklist(),renderOngoing()]);}

async function renderHeader(){
  document.getElementById('month-display').innerHTML=`${MONTHS[curM]}<span class="year">${curY}</span>`;
  document.getElementById('prev-btn').disabled=!(await prevValid(curY,curM));
  document.getElementById('next-btn').disabled=!(await nextValid(curY,curM));
  updateTodayBtn();
}

async function renderBanner(){
  const banner=document.getElementById('outstanding-banner');
  const chips=document.getElementById('banner-chips');
  chips.innerHTML='';
  const allMonths = await getOutstandingMonths();
  // Only show in banner if past (not current month) and incomplete
  const n=getNow();
  const pastIncomplete = allMonths.filter(([y,m])=>monthIdx(y,m)<monthIdx(n.y,n.m));
  if(!pastIncomplete.length){banner.style.display='none';return;}

  // Check completion for each — show all past, marking done ones as cleared
  const rows = await Promise.all(pastIncomplete.map(async([y,m])=>({y,m,done:await isMonthComplete(y,m)})));
  const anyPending = rows.some(r=>!r.done);
  if(!anyPending){banner.style.display='none';return;}

  banner.style.display='block';
  rows.forEach(({y,m,done})=>{
    const btn=document.createElement('button');
    btn.className='banner-chip'+(done?' cleared':'');
    btn.textContent=`${MONTHS[m].slice(0,3)} ${y}`;
    if(!done)btn.addEventListener('click',async()=>{curY=y;curM=m;await render();scrollTo({top:0,behavior:'smooth'});});
    chips.appendChild(btn);
  });
}

async function renderChecklist(){
  const tasks=await loadTasks(), checks=await loadChecks(curY,curM);
  const list=document.getElementById('checklist'); list.innerHTML='';
  const sorted=[...tasks].sort((a,b)=>checks[a]===checks[b]?0:checks[a]?1:-1);
  sorted.forEach(task=>{
    list.appendChild(buildItem({label:task,checked:!!checks[task],draggable:true,
      onCheck:async val=>{
        const c=await loadChecks(curY,curM); c[task]=val; await saveChecks(curY,curM,c); await render();
        const n=getNow();
        if(val&&monthIdx(curY,curM)<monthIdx(n.y,n.m)&&await isMonthComplete(curY,curM))promptArchive(curY,curM);
      },
      onEdit:(li,old)=>startEditTask(li,old),
      onDelete:async()=>{if(!confirm(`Remove "${task}" from recurring tasks?`))return;const t=await loadTasks();await saveTasks(t.filter(x=>x!==task));await render();}
    }));
  });
  setupDrag(list,'tasks');
  const total=tasks.length,done=tasks.filter(t=>checks[t]).length,pct=total?Math.round(done/total*100):0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-pill').textContent=`${done} / ${total}`;
}

async function renderOngoing(){
  const projects=await loadProjects(), list=document.getElementById('ongoing-list'); list.innerHTML='';
  if(!projects.length){const li=document.createElement('li');li.className='empty-row';li.textContent='No ongoing projects yet.';list.appendChild(li);return;}
  const sorted=[...projects].sort((a,b)=>a.completed===b.completed?0:a.completed?1:-1);
  sorted.forEach(project=>{
    list.appendChild(buildItem({label:project.name,checked:project.completed,draggable:true,
      onCheck:async val=>{const ps=await loadProjects(),p=ps.find(x=>x.id===project.id);if(p){p.completed=val;await saveProjects(ps);}await renderOngoing();},
      onEdit:li=>startEditProject(li,project),
      onDelete:async()=>{if(!confirm(`Remove "${project.name}"?`))return;const ps=await loadProjects();await saveProjects(ps.filter(x=>x.id!==project.id));await renderOngoing();}
    }));
  });
  setupDrag(list,'projects');
}

// ── Item builder ──────────────────────────────────────────
function buildItem({label,checked,draggable,onCheck,onEdit,onDelete}){
  const li=document.createElement('li');
  li.className='c-item'+(checked?' is-done':'');
  if(draggable)li.setAttribute('draggable','true');
  li.innerHTML=`<label class="cb"><input type="checkbox" ${checked?'checked':''}/><span class="cb-visual"><svg class="cb-tick" width="11" height="11" viewBox="0 0 11 11"><path d="M1.5 5.5l2.8 2.8 5-5"/></svg></span></label><span class="c-label">${esc(label)}</span><div class="c-actions"><button class="row-btn edit" title="Edit"><svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2.5l2 2L4 12H2v-2L9.5 2.5z"/></svg></button><button class="row-btn del" title="Delete"><svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M3 3l8 8M11 3l-8 8"/></svg></button></div>`;
  li.querySelector('input').addEventListener('change',e=>onCheck(e.target.checked));
  li.querySelector('.c-label').addEventListener('click',e=>{if(window.matchMedia('(hover: none)').matches){e.preventDefault();toggleActions(li);}});
  li.querySelector('.edit').addEventListener('click',e=>{e.stopPropagation();onEdit(li,label);});
  li.querySelector('.del').addEventListener('click',e=>{e.stopPropagation();onDelete();});
  return li;
}

// ── Inline edit ───────────────────────────────────────────
function startEditTask(li,oldName){
  const lel=li.querySelector('.c-label'),act=li.querySelector('.c-actions');
  const inp=document.createElement('input');inp.className='c-edit-input';inp.value=oldName;
  lel.replaceWith(inp);act.classList.add('active','editing');
  act.querySelector('.edit').innerHTML=`<svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7l3.5 3.5L12 3"/></svg>`;
  act.querySelector('.edit').classList.add('confirm');
  setTimeout(()=>{inp.focus();inp.select();},50);
  const save=async()=>{const n=inp.value.trim();if(!n){inp.focus();return;}const tasks=await loadTasks(),idx=tasks.indexOf(oldName);if(idx!==-1)tasks[idx]=n;await saveTasks(tasks);const c=await loadChecks(curY,curM);if(c[oldName]!==undefined){c[n]=c[oldName];delete c[oldName];await saveChecks(curY,curM,c);}activeActionRow=null;await render();};
  act.querySelector('.edit').onclick=save;
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();save();}if(e.key==='Escape')render();});
}
function startEditProject(li,project){
  const lel=li.querySelector('.c-label'),act=li.querySelector('.c-actions');
  const inp=document.createElement('input');inp.className='c-edit-input';inp.value=project.name;
  lel.replaceWith(inp);act.classList.add('active','editing');
  act.querySelector('.edit').innerHTML=`<svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7l3.5 3.5L12 3"/></svg>`;
  act.querySelector('.edit').classList.add('confirm');
  setTimeout(()=>{inp.focus();inp.select();},50);
  const save=async()=>{const n=inp.value.trim();if(!n){inp.focus();return;}const ps=await loadProjects(),p=ps.find(x=>x.id===project.id);if(p){p.name=n;await saveProjects(ps);}activeActionRow=null;await renderOngoing();};
  act.querySelector('.edit').onclick=save;
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();save();}if(e.key==='Escape')renderOngoing();});
}

// ── Drag ─────────────────────────────────────────────────
function setupDrag(list,type){
  let dragSrc=null;
  list.querySelectorAll('.c-item').forEach(item=>{
    item.addEventListener('dragstart',e=>{dragSrc=item;item.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    item.addEventListener('dragend',()=>{item.classList.remove('dragging');list.querySelectorAll('.c-item').forEach(i=>i.classList.remove('drag-over'));dragSrc=null;saveOrder(list,type);});
    item.addEventListener('dragover',e=>{e.preventDefault();if(item!==dragSrc){list.querySelectorAll('.c-item').forEach(i=>i.classList.remove('drag-over'));item.classList.add('drag-over');}});
    item.addEventListener('drop',e=>{e.preventDefault();if(dragSrc&&dragSrc!==item){const items=[...list.querySelectorAll('.c-item')];const si=items.indexOf(dragSrc),ti=items.indexOf(item);if(si<ti)list.insertBefore(dragSrc,item.nextSibling);else list.insertBefore(dragSrc,item);}});
  });
  let touchDragEl=null,touchClone=null,touchOffsetY=0,touchStartY=0,lpt=null;
  list.querySelectorAll('.c-item').forEach(item=>{
    item.addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY;lpt=setTimeout(()=>{touchDragEl=item;item.classList.add('dragging');const r=item.getBoundingClientRect();touchOffsetY=e.touches[0].clientY-r.top;touchClone=item.cloneNode(true);touchClone.style.cssText=`position:fixed;left:${r.left}px;top:${r.top}px;width:${r.width}px;opacity:0.85;z-index:999;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,0.15);border-radius:var(--radius-sm);background:var(--surface);`;document.body.appendChild(touchClone);if(navigator.vibrate)navigator.vibrate(30);},400);},{passive:true});
    item.addEventListener('touchmove',e=>{const dy=Math.abs(e.touches[0].clientY-touchStartY);if(!touchDragEl&&dy>5){clearTimeout(lpt);return;}if(!touchDragEl)return;e.preventDefault();const y=e.touches[0].clientY;if(touchClone)touchClone.style.top=(y-touchOffsetY)+'px';touchClone.style.display='none';const eu=document.elementFromPoint(e.touches[0].clientX,y);touchClone.style.display='';const ti2=eu&&eu.closest('.c-item');if(ti2&&ti2!==touchDragEl&&ti2.closest('ul')===list){list.querySelectorAll('.c-item').forEach(i=>i.classList.remove('drag-over'));ti2.classList.add('drag-over');const items=[...list.querySelectorAll('.c-item')];const si=items.indexOf(touchDragEl),tii=items.indexOf(ti2);if(si<tii)list.insertBefore(touchDragEl,ti2.nextSibling);else list.insertBefore(touchDragEl,ti2);}},{passive:false});
    item.addEventListener('touchend',()=>{clearTimeout(lpt);if(!touchDragEl)return;touchDragEl.classList.remove('dragging');list.querySelectorAll('.c-item').forEach(i=>i.classList.remove('drag-over'));if(touchClone){touchClone.remove();touchClone=null;}touchDragEl=null;saveOrder(list,type);});
    item.addEventListener('touchcancel',()=>{clearTimeout(lpt);if(touchDragEl)touchDragEl.classList.remove('dragging');if(touchClone){touchClone.remove();touchClone=null;}list.querySelectorAll('.c-item').forEach(i=>i.classList.remove('drag-over'));touchDragEl=null;});
  });
}
async function saveOrder(list,type){
  const labels=[...list.querySelectorAll('.c-item .c-label,.c-item .c-edit-input')].map(el=>el.tagName==='INPUT'?el.value:el.textContent);
  if(type==='tasks'){const t=await loadTasks();const r=labels.filter(l=>t.includes(l));t.forEach(x=>{if(!r.includes(x))r.push(x);});await saveTasks(r);}
  else{const ps=await loadProjects();const r=[];labels.forEach(n=>{const p=ps.find(x=>x.name===n);if(p)r.push(p);});ps.forEach(p=>{if(!r.find(x=>x.id===p.id))r.push(p);});await saveProjects(r);}
}

// ── Archive modal ─────────────────────────────────────────
function promptArchive(y,m){
  pendingArchive={y,m};const label=`${MONTHS[m]} ${y}`;
  document.getElementById('modal-title').textContent=`Archive ${label}?`;
  document.getElementById('modal-body').innerHTML=`<strong>${label}</strong> is fully complete. Archive it to remove it from navigation. You can't undo this.`;
  document.getElementById('archive-modal').classList.add('open');
}
document.getElementById('modal-cancel').addEventListener('click',()=>{document.getElementById('archive-modal').classList.remove('open');pendingArchive=null;});
document.getElementById('modal-confirm').addEventListener('click',async()=>{
  document.getElementById('archive-modal').classList.remove('open');
  if(!pendingArchive)return;const{y,m}=pendingArchive;pendingArchive=null;
  await archiveMonth(y,m);
  const next=(await nextValid(y,m))||(await prevValid(y,m));
  if(next){curY=next[0];curM=next[1];}else{const n=getNow();curY=n.y;curM=n.m;}
  await render();
});
document.getElementById('archive-modal').addEventListener('click',e=>{if(e.target===e.currentTarget){e.currentTarget.classList.remove('open');pendingArchive=null;}});

// ── Add ───────────────────────────────────────────────────
document.getElementById('add-task-btn').addEventListener('click',addTask);
document.getElementById('new-task-input').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
async function addTask(){const el=document.getElementById('new-task-input');const v=el.value.trim();if(!v)return;const t=await loadTasks();if(t.includes(v)){el.value='';return;}t.push(v);await saveTasks(t);el.value='';await render();}

document.getElementById('add-project-btn').addEventListener('click',addProject);
document.getElementById('new-project-input').addEventListener('keydown',e=>{if(e.key==='Enter')addProject();});
async function addProject(){const el=document.getElementById('new-project-input');const v=el.value.trim();if(!v)return;const ps=await loadProjects();ps.push({id:'p'+Date.now(),name:v,completed:false});await saveProjects(ps);el.value='';await renderOngoing();}

// ── Navigation ────────────────────────────────────────────
document.getElementById('prev-btn').addEventListener('click',async()=>{const p=await prevValid(curY,curM);if(p){curY=p[0];curM=p[1];await render();}});
document.getElementById('next-btn').addEventListener('click',async()=>{const n=await nextValid(curY,curM);if(n){curY=n[0];curM=n[1];await render();}});

// ── PWA ───────────────────────────────────────────────────
function registerSW(){if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

init();
</script>
